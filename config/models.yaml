# N.O.V.A Model Configuration
# Edit here to change models without touching individual scripts.
# Run: nova config models  to verify current settings.
#
# All models run LOCALLY via Ollama — no cloud, no content filters.
# Recommended uncensored models for security research:
#   ollama pull dolphin-mistral       — uncensored Mistral, great for security
#   ollama pull nous-hermes2-mixtral  — uncensored Mixtral 8x7B, very capable
#   ollama pull wizardlm2             — WizardLM2 uncensored
#   ollama pull llava                 — vision (image/video understanding)
#   ollama pull codellama:13b-instruct — best for code tasks

models:
  # Fast reasoning — triage, scoring, hypothesis generation, security analysis
  # dolphin-mistral is uncensored — won't refuse security research questions
  reasoning:    "dolphin-mistral:latest"

  # General purpose — summaries, research synthesis, chat
  general:      "dolphin-mistral:latest"

  # Creative work — dreams, life engine, philosophy, letters, poetry
  creative:     "dolphin-mistral:latest"

  # Code tasks — self-healing, proposal evaluation, exploit PoC drafting
  code:         "codellama:13b-instruct"

  # Vision — image analysis, video frame description
  vision:       "llava:latest"

  # Autonomous decisions — needs best reasoning available
  autonomous:   "dolphin-mistral:latest"

  # Market brief + report writing — narrative quality matters
  writing:      "dolphin-mistral:latest"

  # GAN generator / discriminator
  gan_generator:     "dolphin-mistral:latest"
  gan_discriminator: "dolphin-mistral:latest"

temperatures:
  reasoning:   0.1    # hypothesize, reflect — deterministic
  triage:      0.1    # act/observe/hold decisions
  balanced:    0.4    # research synthesis
  autonomous:  0.7    # autonomous task selection
  creative:    0.9    # dreams, life engine, poetry
  summarize:   0.3    # memory summarization

timeouts:
  fast:        60     # quick tasks
  standard:    180    # normal pipeline stages
  medium:      120    # alerts, market brief sections
  heavy:       300    # GAN, deep reasoning
  dream:       600    # dream generation (long context)

ollama_url: "http://localhost:11434/api/generate"

# Pull recommended models:
#   ollama pull dolphin-mistral
#   ollama pull llava
#   ollama pull codellama:13b-instruct
