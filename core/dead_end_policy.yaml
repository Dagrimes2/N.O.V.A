version: 1

auto_promote:
  enabled: true

thresholds:
  min_attempts: 3
  min_confidence_below: 0.25
  consecutive_cycles: 2
  min_failures: 3
signals_considered_failure:
  - no_new_signals
  - repeated_403
  - repeated_404
  - identical_response_size

cooldown:
  allow_revisit_after_hours: 168

human_override:
  required_for:
    - admin_panels
    - authentication_flows

logging:
  record_reason: true
  record_evidence: true
decay:
  days: 14

actions:
  confirmed: suppress
  suspected: de-prioritize
