external_intel:
  sources:
    clawdbot:
      enabled: true
      role: observer
      trust: unverified
      rate_limit:
        requests_per_minute: 10
      allowed_fields:
        - host
        - path
        - method
        - params
        - headers
        - status
      forbidden:
        - confidence
        - decision
        - promotion
        - memory_write
        - eki_write
      tagging:
        source: clawdbot
        confidence: 0.0
        quarantine: true
