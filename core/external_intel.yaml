external_intel:
  enabled: true

  sources:
    clawdbot:
      url: https://openclaw.ai/
      role: signal_only
      trust_level: low
      persistence: false
      memory_write: false
      action_authority: none

  rules:
    - external_intel_must_pass: meta_reason
    - external_intel_cannot_trigger: act
    - external_intel_requires: human_confirmation

  violations:
    on_breach: disable_source

